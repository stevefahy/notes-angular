@if (!notebookLoaded()) {
  <li>
    <NotebookListHtml [notebook_item]="null" [notebookLoaded]="false" />
  </li>
}
@if (notebookLoaded()) {
  <li>
    <a routerLink="/notebook/{{ notebook_item._id }}" class="notebook-link">
      <NotebookListHtml
        [notebook_item]="notebook_item"
        [notebookLoaded]="notebookLoaded()"
        [noteCount]="notebook_item.noteCount"
      />
    </a>
  </li>
}
