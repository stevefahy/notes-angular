<div class="bottom-sheet-wrapper" (click)="$event.stopPropagation()">
  <div class="bottom-sheet" aria-labelledby="add-notebook-title">
    <div class="sheet-handle"></div>

    <h2 id="add-notebook-title" class="sheet-title">
      {{ method === "edit" ? "Edit Notebook" : "New Notebook" }}
    </h2>

    <form (ngSubmit)="submitHandler($event)">
      <div class="sheet-field">
        <label class="form-label" for="new-notebook">Name</label>
        <input
          #nameInput
          class="form-input"
          type="text"
          id="new-notebook"
          name="notebookName"
          placeholder="e.g. Personal, Work…"
          [(ngModel)]="currentName"
          (ngModelChange)="nameChangeHandler()"
          [attr.aria-busy]="isSubmitting() ? 'true' : null"
          [disabled]="isSubmitting()"
        />
      </div>

      <fieldset class="sheet-field sheet-fieldset">
        <legend class="form-label">Cover colour</legend>
        <div class="swatch-row">
          @for (
            folder of folderOptions;
            track trackfolderOptions($index, folder)
          ) {
            <button
              type="button"
              class="swatch swatch-{{ folder.value }}"
              [class.selected]="selectedCover() === folder.value"
              [disabled]="isSubmitting()"
              [attr.aria-label]="folder.viewValue + ' cover'"
              [attr.aria-pressed]="selectedCover() === folder.value"
              (click)="coverChangeHandler(folder.value)"
            ></button>
          }
        </div>
      </fieldset>
    </form>

    @if (error().error_state) {
      <div class="sheet-field">
        <ErrorAlert
          [error_state]="error().error_state ?? false"
          [message]="error().message ?? ''"
        />
      </div>
    }

    <div class="sheet-actions">
      <button
        type="button"
        class="btn-cancel"
        (click)="cancelHandler($event)"
        aria-label="Cancel button"
      >
        Cancel
      </button>
      <button
        type="button"
        class="btn-create"
        [disabled]="isCreateButtonDisabled() || isSubmitting()"
        (click)="submitHandler($event)"
        [attr.aria-label]="
          method === 'edit' ? 'Confirm edit button' : 'Create notebook button'
        "
      >
        @if (isSubmitting()) {
          {{ method === "edit" ? "Saving…" : "Creating…" }}
        } @else {
          {{ method === "edit" ? "Confirm" : "Create" }}
        }
      </button>
    </div>
  </div>
</div>
